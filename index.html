<!DOCTYPE html>
<html lang="en">
<head> 
<link rel="apple-touch-icon" href="IMG_7450.jpeg">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="My Schedule">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#041E42">
<title>My PSU Schedule</title>
<style>
  :root {
    --psu-navy: #041E42;
    --psu-navy-dark: #020f22;
    --psu-blue-light: #1e3a5f;
    --psu-white: #ffffff;
    --psu-grey: #96A9AB;
    --accent-gold: #d9a441;
    --green: #4a7a5e;
    --bg: #eef1f4;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, "Helvetica Neue", Roboto, Arial, sans-serif;
    background: var(--bg);
    margin: 0;
    padding: 0 0 40px 0;
    color: #1a1a1a;
  }

  /* ---- Header ---- */
  #header {
    background: linear-gradient(135deg, var(--psu-navy) 0%, var(--psu-navy-dark) 100%);
    color: white;
    padding: 28px 20px 22px 20px;
    position: relative;
    overflow: hidden;
  }
  #header::after {
    content: "";
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 6px;
    background: repeating-linear-gradient(90deg, var(--accent-gold) 0 20px, var(--psu-white) 20px 40px);
    opacity: 0.85;
  }
  .badge-row {
    display: flex;
    align-items: center;
    gap: 14px;
    position: relative;
    z-index: 1;
  }
  .psu-badge {
    width: 54px; height: 54px;
    border-radius: 50%;
    background: var(--psu-white);
    color: var(--psu-navy);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 1.1em;
    letter-spacing: -1px;
    border: 3px solid var(--accent-gold);
    flex-shrink: 0;
  }
  #header h1 {
    margin: 0;
    font-size: 1.4em;
    letter-spacing: 0.5px;
  }
  #header .subtitle {
    margin: 2px 0 0 0;
    font-size: 0.85em;
    color: #b9c4d4;
  }

  #content { padding: 18px 16px 0 16px; }

  /* ---- Now Banner ---- */
  #now-banner {
    background: var(--psu-white);
    border: 2px solid var(--psu-navy);
    border-radius: 14px;
    padding: 16px 18px;
    margin-bottom: 22px;
    box-shadow: 0 2px 8px rgba(4,30,66,0.12);
  }
  #now-banner .tag {
    display: inline-block;
    background: var(--psu-navy);
    color: white;
    font-size: 0.7em;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 8px;
  }
  #now-banner .main-line {
    font-size: 1.05em;
    font-weight: 700;
    color: var(--psu-navy);
  }
  #now-banner .small { font-size: 0.85em; color: #a9761a; margin-top: 6px; font-weight: 600; }

  /* ---- Day blocks ---- */
  .day-block {
    background: white;
    border-radius: 14px;
    margin-bottom: 14px;
    padding: 14px 16px 16px 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .day-title {
    font-weight: 800;
    color: var(--psu-navy);
    margin-bottom: 10px;
    font-size: 1.05em;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .day-title::before {
    content: "🐾";
    font-size: 0.9em;
  }
  .class-card {
    background: #f4f6f8;
    border-left: 5px solid var(--green);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 10px;
    position: relative;
  }
  .class-card.waitlist { border-left-color: var(--accent-gold); background: #fbf4e4; }
  .class-card.club { border-left-color: var(--psu-blue-light); background: #e9eef7; }
  .class-name { font-weight: 700; color: #14213d; font-size: 1em; }
  .class-meta { font-size: 0.85em; color: #555; margin-top: 3px; line-height: 1.4; }
  .directions-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-top: 8px;
    font-size: 0.8em;
    font-weight: 600;
    color: white;
    background: var(--psu-navy);
    padding: 6px 12px;
    border-radius: 20px;
    text-decoration: none;
  }
  .directions-link:active { opacity: 0.75; }
  .empty-day { color: #aaa; font-style: italic; font-size: 0.88em; }
  .remove-btn {
    color: #b00020;
    cursor: pointer;
    font-size: 0.78em;
    background: none;
    border: none;
    margin-top: 6px;
    font-weight: 600;
    padding: 0;
  }

  /* ---- Add form ---- */
  #add-form {
    background: white;
    border-radius: 14px;
    padding: 18px;
    margin-top: 26px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    border-top: 4px solid var(--accent-gold);
  }
  #add-form h2 {
    margin-top: 0;
    color: var(--psu-navy);
    font-size: 1.05em;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  #add-form label { display: block; margin-top: 12px; font-size: 0.85em; font-weight: 700; color: #333; }
  #add-form input[type=text], #add-form input[type=time] {
    width: 100%; padding: 10px; margin-top: 5px; border: 1.5px solid #d5d9de; border-radius: 8px;
    font-size: 0.95em;
    background: #fafbfc;
  }
  #add-form input:focus { outline: none; border-color: var(--psu-navy); }
  .day-checks { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .day-checks label {
    display: flex; align-items: center; gap: 4px;
    font-weight: 500; font-size: 0.85em;
    background: #f0f2f4;
    padding: 6px 10px;
    border-radius: 8px;
    margin-top: 0;
  }
  #add-form button {
    width: 100%;
    margin-top: 16px;
    background: var(--psu-navy);
    color: white;
    border: none;
    padding: 13px 18px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 1em;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  #add-form button:active { opacity: 0.85; }

  footer {
    text-align: center;
    font-size: 0.75em;
    color: #99a;
    margin-top: 26px;
    padding: 0 16px;
  }
</style>
</head>
<body>

<div id="header">
  <div class="badge-row">
    <div class="psu-badge">PSU</div>
    <div>
      <h1>My Schedule</h1>
      <p class="subtitle">Digital Journalism (Sports Broadcasting) · Education Minor</p>
    </div>
  </div>
</div>

<div id="content">
  <div id="now-banner"></div>
  <div id="week-container"></div>

  <div id="add-form">
    <h2>🐾 Add a Club or Activity</h2>
    <label>Name</label>
    <input type="text" id="clubName" placeholder="e.g. Sports Broadcasting Club">
    <label>Days</label>
    <div class="day-checks" id="dayChecks">
      <label><input type="checkbox" value="Mon">Mon</label>
      <label><input type="checkbox" value="Tue">Tue</label>
      <label><input type="checkbox" value="Wed">Wed</label>
      <label><input type="checkbox" value="Thu">Thu</label>
      <label><input type="checkbox" value="Fri">Fri</label>
      <label><input type="checkbox" value="Sat">Sat</label>
      <label><input type="checkbox" value="Sun">Sun</label>
    </div>
    <label>Start Time</label>
    <input type="time" id="clubStart">
    <label>End Time</label>
    <input type="time" id="clubEnd">
    <label>Location / Building</label>
    <input type="text" id="clubLocation" placeholder="e.g. HUB-Robeson Center">
    <button onclick="addClub()">+ Add to Schedule</button>
  </div>

  <footer>Made for Penn State University Park · We Are!</footer>
</div>

<script>
const DAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

const classes = [
  { name: "RUS 1 - 002", type: "Lecture", days: ["Mon","Fri"], start: "10:10", end: "11:00", building: "Ag Science & Industries Building", room: "110" },
  { name: "RUS 1 - 002L", type: "Discussion", days: ["Tue","Thu"], start: "10:35", end: "11:25", building: "Ferguson Building", room: "202" },
  { name: "PSU 9 - 021", type: "Lecture", days: ["Mon"], start: "11:15", end: "12:30", building: "Willard Building", room: "002" },
  { name: "HDFS 229 - 002", type: "Lecture", days: ["Tue","Thu"], start: "12:05", end: "13:20", building: "Thomas Building", room: "102" },
  { name: "ENGL 30H - 001", type: "Lecture (WAITLISTED)", days: ["Mon","Wed","Fri"], start: "13:25", end: "14:15", building: "Thomas Building", room: "119", waitlist: true },
  { name: "COMM 271 - 001", type: "Lecture", days: ["Tue","Thu"], start: "13:35", end: "14:50", building: "Sparks Building", room: "010" }
];

function loadClubs() { return JSON.parse(localStorage.getItem("clubs") || "[]"); }
function saveClubs(clubs) { localStorage.setItem("clubs", JSON.stringify(clubs)); }
function toMinutes(t) { const [h,m] = t.split(":").map(Number); return h*60+m; }
function directionsUrl(building) {
  const query = encodeURIComponent(building + ", Penn State University Park, PA");
  return "https://www.google.com/maps/search/?api=1&query=" + query;
}
function formatTime(t) {
  const [h,m] = t.split(":").map(Number);
  const ampm = h >= 12 ? "PM" : "AM";
  const h12 = h % 12 === 0 ? 12 : h % 12;
  return `${h12}:${m.toString().padStart(2,"0")} ${ampm}`;
}

function renderWeek() {
  const clubs = loadClubs().map(c => ({...c, isClub: true}));
  const all = [...classes, ...clubs];
  const container = document.getElementById("week-container");
  container.innerHTML = "";

  DAYS.forEach(day => {
    const dayEvents = all
      .filter(e => e.days.includes(day))
      .sort((a,b) => toMinutes(a.start) - toMinutes(b.start));

    const block = document.createElement("div");
    block.className = "day-block";
    let html = `<div class="day-title">${day}</div>`;

    if (dayEvents.length === 0) {
      html += `<div class="empty-day">Nothing scheduled</div>`;
    } else {
      dayEvents.forEach(e => {
        const cardClass = e.isClub ? "club" : (e.waitlist ? "waitlist" : "");
        html += `
          <div class="class-card ${cardClass}">
            <div class="class-name">${e.name}${e.waitlist ? " ⚠️ Waitlisted" : ""}${e.isClub ? " · Club" : ""}</div>
            <div class="class-meta">${e.type ? e.type + " · " : ""}${formatTime(e.start)}–${formatTime(e.end)} · ${e.building}${e.room ? " " + e.room : ""}</div>
            <a class="directions-link" target="_blank" href="${directionsUrl(e.building)}">📍 Directions</a>
            ${e.isClub ? `<div><button class="remove-btn" onclick="removeClub('${e.name.replace(/'/g,"\\'")}')">✕ Remove</button></div>` : ""}
          </div>`;
      });
    }
    block.innerHTML = html;
    container.appendChild(block);
  });
}

function renderNowBanner() {
  const now = new Date();
  const dayName = DAYS[(now.getDay() + 6) % 7];
  const nowMin = now.getHours()*60 + now.getMinutes();
  const clubs = loadClubs().map(c => ({...c, isClub: true}));
  const all = [...classes, ...clubs];

  const todayEvents = all
    .filter(e => e.days.includes(dayName))
    .sort((a,b) => toMinutes(a.start) - toMinutes(b.start));

  const current = todayEvents.find(e => nowMin >= toMinutes(e.start) && nowMin < toMinutes(e.end));
  const next = todayEvents.find(e => toMinutes(e.start) > nowMin);

  const banner = document.getElementById("now-banner");
  if (current) {
    banner.innerHTML = `<span class="tag">RIGHT NOW</span>
      <div class="main-line">${current.name} · until ${formatTime(current.end)}</div>
      <div class="class-meta">${current.building}${current.room ? " " + current.room : ""}</div>
      ${current.waitlist ? `<div class="small">⚠️ Waitlisted — confirm you're enrolled</div>` : ""}`;
  } else if (next) {
    banner.innerHTML = `<span class="tag">NEXT UP</span>
      <div class="main-line">${next.name} · ${formatTime(next.start)}</div>
      <div class="class-meta">${next.building}${next.room ? " " + next.room : ""}</div>`;
  } else {
    banner.innerHTML = `<span class="tag">TODAY</span><div class="main-line">Nothing else scheduled 🎉</div>`;
  }
}

function addClub() {
  const name = document.getElementById("clubName").value.trim();
  const start = document.getElementById("clubStart").value;
  const end = document.getElementById("clubEnd").value;
  const location = document.getElementById("clubLocation").value.trim();
  const days = Array.from(document.querySelectorAll("#dayChecks input:checked")).map(c => c.value);

  if (!name || !start || !end || days.length === 0 || !location) {
    alert("Please fill in name, days, start/end time, and location.");
    return;
  }

  const clubs = loadClubs();
  clubs.push({ name, start, end, days, building: location, type: "Club/Activity" });
  saveClubs(clubs);

  document.getElementById("clubName").value = "";
  document.getElementById("clubLocation").value = "";
  document.getElementById("clubStart").value = "";
  document.getElementById("clubEnd").value = "";
  document.querySelectorAll("#dayChecks input").forEach(c => c.checked = false);

  renderWeek();
  renderNowBanner();
}

function removeClub(name) {
  let clubs = loadClubs();
  clubs = clubs.filter(c => c.name !== name);
  saveClubs(clubs);
  renderWeek();
  renderNowBanner();
}

renderWeek();
renderNowBanner();
setInterval(renderNowBanner, 60000);
</script>

</body>
</html>
